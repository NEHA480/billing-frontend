<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>🧾 Billing App</h2>
      <p>Sign in to your account</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Enter username" autocomplete="username" />
        <span class="validation-error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          Username is required
        </span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter password" autocomplete="current-password" />
        <span class="validation-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password is required
        </span>
      </div>
      <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>
      <button type="submit" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">Logging in...</span>
      </button>
    </form>
    <p class="hint">Default: admin / admin123</p>
    <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
